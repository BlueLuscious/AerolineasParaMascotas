{% extends "Base.html" %}

{% block content %} 
{% load static %}

<style>
  .container-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr); /* Tres columnas de igual tamaño */
    gap: 30px; 
  }
  .tm-section-category {
    display: grid;
    padding-left: 20%;
    grid-template-columns: 1fr; /* Una columna para cada sección */
    gap: 20px; /* Espacio entre elementos */
  }
  .img-container img {
    max-width: 100%; /* Ajustar el tamaño máximo de la imagen */
    height: auto; /* Mantener la proporción de la imagen */
  }
  .text-container {
    display: flex;
    flex-direction: column; /* Alinear el texto debajo de la imagen */
  }
  .tm-section-category {
    margin-bottom: 20px; /* Agregar un espacio entre las secciones */
  }

</style>

<div class="container-grid">

  <div class="tm-section-category">
    <div class="img-container">
      <img src="{% static 'img/mapas/mapa_generico.png' %}" class="country-img" />
    </div>
    <div class="text-container tm-flex-align-center col text-center">
      <h4 class="tm-color-white tm-section-title">Pais 1</h4>
      <p class="tm-color-white tm-section-subtitle">
        -Requisito 1 <br>
        -Requisito 2
      </p>
    </div>
  </div>

  <div class="tm-section-category">
    <div class="img-container">
      <img src="{% static 'img/mapas/mapa_generico.png' %}" class="country-img" />
    </div>
    <div class="text-container tm-flex-align-center col text-center">
      <h4 class="tm-color-white tm-section-title">Pais 2</h4>
      <p class="tm-color-white tm-section-subtitle">
        -Requisito 1 <br>
        -Requisito 2
      </p>
    </div>
    
  </div>
  <div class="tm-section-category">
    <div class="img-container">
      <img src="{% static 'img/mapas/mapa_generico.png' %}" class="country-img" />
    </div>
    <div class="text-container tm-flex-align-center col text-center">
      <h4 class="tm-color-white tm-section-title">Pais 3</h4>
      <p class="tm-color-white tm-section-subtitle">
        -Requisito 1 <br>
        -Requisito 2
      </p>
    </div>
  </div>
  <!-- Repite el mismo patrón para las otras secciones -->

</div>

<div class="text-container-button col text-center">
  <br /><br />
  <a href="{% url 'index' %}" class="tm-bg-secondary tm-color-white tm-font-semibold tm-border-radius-s tm-margin-b-5 tm-btn-white-bordered">Volver</a>
</div>
{% endblock content %}
